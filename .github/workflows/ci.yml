name: CI

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project with development tools
        run: python -m pip install -e ".[dev]"

      - name: Check formatting
        run: python -m ruff format --check src tests ui scripts

      - name: Lint
        run: python -m ruff check src tests ui scripts

      - name: Import smoke check
        run: python scripts/import_check.py

      - name: Run tests
        run: python -m pytest -q
