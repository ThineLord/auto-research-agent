model:
  provider: ollama
  name: qwen3:8b
  temperature: 0.3
  timeout_seconds: 300
  gemini:
    api_key_env: GEMINI_API_KEY
    api_key: ""
    models:
      - gemini-3.5-flash
      - gemini-2.5-flash
      - gemini-2.5-pro
      - gemini-2.5-flash-lite
ollama_base_url: http://localhost:11434
project_name: example
topic:
  title: Example Research Planning Task
  description: A public-safe starter project for learning the local research workflow.
  keywords:
    - research
    - planning
    - methods
    - evaluation
    - risks
max_rounds: 5
stop_if_no_improvement_rounds: 2
top_p: 0.9
runtime:
  normal_max_runtime_seconds: 10800
  continuous_max_runtime_seconds: 43200
